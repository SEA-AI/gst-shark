<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GstShark Processing Report</title>
<script src="https://cdn.plot.ly/plotly-basic-2.35.2.min.js"></script>
<style>
  :root {
    --bg: #f8f9fa; --card: #fff; --border: #dee2e6; --accent: #0d6efd;
    --warn: #ffc107; --info: #0dcaf0; --text: #212529; --muted: #6c757d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
    background: var(--bg); color: var(--text); padding: 2rem; line-height: 1.5;
  }
  h1 {
    font-size: 1.6rem; margin-bottom: 1.5rem;
    border-bottom: 3px solid var(--accent); padding-bottom: .5rem;
  }
  h2 { font-size: 1.2rem; margin: 1.5rem 0 .75rem; color: var(--accent); }
  h3 { font-size: 1.05rem; margin: 1rem 0 .5rem; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: .5rem; padding: 1.25rem; margin-bottom: 1rem;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  table { border-collapse: collapse; font-size: .9rem; }
  th, td {
    padding: .5rem .75rem; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  th { background: var(--bg); font-weight: 600; position: sticky; top: 0; }
  td.num { font-variant-numeric: tabular-nums; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: #d0e0ff; }
  tr:hover td { background: #f0f4ff; }
  .highlight { background: #fff3cd; }
  .badge {
    display: inline-block; padding: .2em .55em; border-radius: .25rem;
    font-size: .8rem; font-weight: 600;
  }
  .badge-warn { background: var(--warn); color: #000; }
  .badge-info { background: var(--info); color: #000; }
  .summary { display: flex; gap: 1rem; flex-wrap: wrap; margin: .75rem 0; }
  .summary .kv {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: .375rem; padding: .5rem 1rem;
  }
  .summary .kv .label {
    font-size: .75rem; color: var(--muted); text-transform: uppercase;
  }
  .summary .kv .value { font-size: 1.1rem; font-weight: 600; }
  .muted { color: var(--muted); font-style: italic; }
  .plot-section { margin-top: 2rem; }
  .plot-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: .5rem; padding: 1rem; margin-bottom: 1.5rem;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .plot-card h3 { margin-top: 0; }
  .back-link { font-size: .85rem; margin-bottom: .5rem; display: inline-block; }
  .plot-container { width: 100%; height: 350px; }
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
    z-index:1000; align-items:center; justify-content:center;
  }
  .modal-content {
    background:#fff; border-radius:.75rem; width:calc(100vw - 3rem);
    height:calc(100vh - 3rem); padding:1.5rem; box-shadow:0 8px 32px rgba(0,0,0,.2);
    position:relative; display:flex; flex-direction:column;
  }
  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
  .modal-header h3 { margin:0; font-size:1.1rem; }
  .modal-close {
    background:none; border:none; font-size:1.5rem; cursor:pointer;
    color:var(--muted); padding:0 .25rem; line-height:1;
  }
  .modal-close:hover { color:var(--text); }
  .pipeline-diagram { overflow-x: auto; }
  .pipeline-diagram svg { height: auto; max-width: none; display: block; }
  .collapsible-section > summary { list-style: none; cursor: pointer; }
  .collapsible-section > summary::-webkit-details-marker { display: none; }
  .collapsible-section > summary h2 { display: inline-flex; align-items: center; gap: .4rem; }
  .collapsible-section > summary h2::before {
    content: '▶'; font-size: .75rem; transition: transform .15s;
  }
  .collapsible-section[open] > summary h2::before { transform: rotate(90deg); }
</style>
</head>
<body>
<h1>GstShark Processing Report</h1>
<!-- SECTIONS -->
<!-- MODAL -->
<!-- SCRIPTS -->
</body>
</html>
